name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  scan:
    name: Security Scans
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Image Tag
        id: meta
        run: echo "image_tag=secure-app:${GITHUB_SHA}" >> $GITHUB_OUTPUT

      # SAST
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1

      # Dependency Scan
      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r requirements.txt -f json -o dep-scan.json

      # Secret Scan
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: HEAD~1
          head: HEAD

      # Upload dependency scan artifact
      - name: Upload Dependency Scan
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan
          path: dep-scan.json

  build:
    name: Build and Secure Artifact
    runs-on: ubuntu-latest
    needs: scan

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Build container
      - name: Build Docker Image
        run: docker build -t secure-app:${GITHUB_SHA} .

      # Container scan
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: secure-app:${{ github.sha }}
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          exit-code: 1

      # SBOM generation
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: secure-app:${{ github.sha }}
          format: cyclonedx-json
          output-file: sbom.json

      # Trusted build metadata
      - name: Mark Trusted Build
        run: |
          echo "TRUSTED_BUILD=true" > build-metadata.txt
          echo "IMAGE=secure-app:${GITHUB_SHA}" >> build-metadata.txt

      # Upload artifacts
      - name: Upload Container Scan
        uses: actions/upload-artifact@v4
        with:
          name: container-scan
          path: trivy-report.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Upload Build Metadata
        uses: actions/upload-artifact@v4
        with:
          name: build-metadata
          path: build-metadata.txt
